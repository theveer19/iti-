<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Enquiry</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Arial,sans-serif;
    background:#fff;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

h2{
    text-align:center;
    color:#f34a53;
    font-size:42px;
    margin-bottom:15px;
}

.info{
    text-align:center;
    font-size:18px;
    color:#333;
    line-height:1.7;
    margin-bottom:30px;
}

.info b{
    color:#f34a53;
}

table{
    width:100%;
}

input,textarea{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    background:#f7f7f7;
    border-radius:4px;
    font-size:16px;
}

textarea{
    height:120px;
    resize:none;
}

button{
    background:#f34a53;
    color:#fff;
    border:none;
    padding:14px 40px;
    font-size:20px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#df3942;
}

button:disabled{
    background:#ccc;
    cursor:not-allowed;
}

.privacy{
    text-align:center;
    margin-top:15px;
    font-size:13px;
    color:#666;
}

.privacy a{
    color:#f34a53;
}

/* honeypot: hidden from real users, bots fill it */
.hp-field{
    position:absolute;
    left:-9999px;
    top:-9999px;
    width:1px;
    height:1px;
    overflow:hidden;
}

@media(max-width:768px){
    table,tbody,tr,td{
        display:block;
        width:100%;
    }

    td{
        padding:8px 0 !important;
    }

    h2{
        font-size:30px;
    }

    button{
        width:100%;
    }
}
</style>

</head>
<body>

<div class="container">

<h2>आज ही संपर्क करें...</h2>

<p class="info">
नयी / पुरानी आईटीआई खोलने एवं संबद्धता प्राप्त करने हेतु नीचे दिए गए फॉर्म को भरें एवं
<b>एक्सपर्ट्स</b> द्वारा <b>Free</b> में जानकारी हासिल करें।
</p>

<form id="enquiryForm">

  <!-- Web3Forms required + email settings -->
  <input type="hidden" name="access_key" value="4acc42f2-923a-4d59-a852-cf311f792331">
  <input type="hidden" name="subject" value="New ITI Enquiry (Google Ads)">
  <input type="hidden" name="from_name" value="ITI Affiliation Consultancy Website">

  <!-- honeypot: real users never see/fill this; bots do and get rejected -->
  <input type="checkbox" name="botcheck" class="hp-field" tabindex="-1" autocomplete="off">

  <table>
    <tbody>
      <tr>
        <td style="padding:8px;">
          <input type="text" name="name" placeholder="नाम" required>
        </td>
        <td style="padding:8px;">
          <input type="tel" name="phone" placeholder="फ़ोन नंबर" required>
        </td>
      </tr>

      <tr>
        <td style="padding:8px;">
          <input type="email" name="email" placeholder="ईमेल">
        </td>
        <td style="padding:8px;">
          <input type="text" name="location" placeholder="जिला / राज्य">
        </td>
      </tr>

      <tr>
        <td style="padding:8px;">
          <textarea name="message" placeholder="यहाँ अपना संदेश लिखें"></textarea>
        </td>
        <td style="padding:8px;text-align:center;vertical-align:middle;">
          <button type="submit" id="submitBtn">भेजें</button>
        </td>
      </tr>
    </tbody>
  </table>

  <p class="privacy">
    फॉर्म जमा करके आप हमारी
    <a href="privacy-policy.html" target="_blank">Privacy Policy</a>
    से सहमत होते हैं।
  </p>

</form>

</div>

<script>
document.getElementById('enquiryForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const form = e.target;
  const btn = document.getElementById('submitBtn');

  btn.disabled = true;
  btn.textContent = 'भेजा जा रहा है...';

  const data = new FormData(form);

  try {
    const res = await fetch('https://api.web3forms.com/submit', {
      method: 'POST',
      body: data,
      headers: { 'Accept': 'application/json' }
    });

    const json = await res.json();

    // Web3Forms returns { success: true } only on a real, accepted submission.
    // We redirect ONLY on confirmed success so the Google Ads conversion tag
    // on thank-you.html fires for genuine leads and never on failures.
    if (json.success === true) {
      window.location.replace('https://www.itiaffiliationconsultancy.com/thank-you.html');
    } else {
      alert('कुछ गड़बड़ हुई: ' + (json.message || 'दोबारा कोशिश करें।'));
      btn.disabled = false;
      btn.textContent = 'भेजें';
    }

  } catch (err) {
    // Network failure — never let a paid lead vanish silently; ask them to retry.
    alert('नेटवर्क की समस्या है, दोबारा कोशिश करें।');
    btn.disabled = false;
    btn.textContent = 'भेजें';
  }
});
</script>

</body>
</html>
