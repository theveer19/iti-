<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Enquiry</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#fff;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

h2{
    text-align:center;
    color:#f34a53;
    font-size:42px;
    margin-bottom:15px;
}

.info{
    text-align:center;
    font-size:18px;
    color:#333;
    line-height:1.7;
    margin-bottom:30px;
}

.info b{
    color:#f34a53;
}

table{
    width:100%;
}

input,
textarea{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    background:#f7f7f7;
    border-radius:4px;
    font-size:16px;
}

textarea{
    height:120px;
    resize:none;
}

button{
    background:#f34a53;
    color:#fff;
    border:none;
    padding:14px 40px;
    font-size:20px;
    border-radius:5px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#df3942;
}

@media(max-width:768px){

    table,
    tbody,
    tr,
    td{
        display:block;
        width:100%;
    }

    td{
        padding:8px 0 !important;
    }

    h2{
        font-size:30px;
    }

    button{
        width:100%;
    }
}
</style>

</head>
<body>

<div class="container">

<h2>आज ही संपर्क करें...</h2>

<p class="info">
नयी / पुरानी आईटीआई खोलने एवं संबद्धता प्राप्त करने हेतु नीचे दिए गए फॉर्म को भरें एवं
<b>एक्सपर्ट्स</b> द्वारा <b>Free</b> में जानकारी हासिल करें।
</p>

<form action="https://formspree.io/f/xlgkopna" method="POST">

<input type="hidden"
       name="_next"
       value="https://itiaffiliationconsultancy.com/thank-you.html">

<table>
<tr>
<td style="padding:8px;">
<input type="text" name="name" placeholder="नाम" required>
</td>

<td style="padding:8px;">
<input type="tel" name="phone" placeholder="फ़ोन नंबर" required>
</td>
</tr>

<tr>
<td style="padding:8px;">
<input type="email" name="email" placeholder="ईमेल">
</td>

<td style="padding:8px;">
<input type="text" name="location" placeholder="जिला / राज्य">
</td>
</tr>

<tr>
<td style="padding:8px;">
<textarea name="message" placeholder="यहाँ अपना संदेश लिखें"></textarea>
</td>

<td style="padding:8px;text-align:center;vertical-align:middle;">
<button type="submit">भेजें</button>
</td>
</tr>
</table>

</form>

</div>

</body>
</html>
