<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Quick Enquiry</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Droid Sans',sans-serif;
    background:#fff;
    padding:15px;
}

h2{
    text-align:center;
    color:#f34a53;
    font-size:42px;
    margin:10px 0;
    font-weight:bold;
}

.info{
    text-align:center;
    font-size:18px;
    color:#222;
    line-height:1.6;
    margin-bottom:25px;
}

.info b{
    color:#f34a53;
}

.form-row{
    display:flex;
    gap:25px;
    margin-bottom:18px;
}

.form-group{
    flex:1;
}

input,
textarea{
    width:100%;
    padding:14px;
    border:1px solid #cfcfcf;
    background:#f5f5f5;
    border-radius:3px;
    font-size:18px;
}

textarea{
    height:110px;
    resize:none;
}

.submit-area{
    text-align:center;
    margin-top:15px;
}

button{
    background:#f34a53;
    color:#fff;
    border:none;
    padding:14px 50px;
    font-size:24px;
    border-radius:4px;
    cursor:pointer;
}

button:hover{
    background:#df3942;
}

@media(max-width:768px){
    .form-row{
        flex-direction:column;
        gap:10px;
    }

    h2{
        font-size:30px;
    }
}
</style>
</head>
<body>

<h2>आज ही संपर्क करें...</h2>

<p class="info">
नयी / पुरानी आईटीआई खोलने एवं संबद्धता प्राप्त करने हेतु नीचे दिए गए फॉर्म को भरें एवं
<b>एक्सपर्ट्स</b> द्वारा <b>Free</b> में जानकारी हासिल करें ..
</p>

<form action="https://formspree.io/f/xlgkopna" method="POST">

<input type="hidden"
       name="_next"
       value="https://itiaffiliationconsultancy.com/thank-you.html">

<table style="width:100%;">
    <tr>
        <td style="padding:8px;">
            <input type="text" name="name" placeholder="नाम" required>
        </td>

        <td style="padding:8px;">
            <input type="tel" name="phone" placeholder="फ़ोन नंबर" required>
        </td>
    </tr>

    <tr>
        <td style="padding:8px;">
            <input type="email" name="email" placeholder="ईमेल">
        </td>

        <td style="padding:8px;">
            <input type="text" name="location" placeholder="जिला / राज्य">
        </td>
    </tr>

    <tr>
        <td style="padding:8px;">
            <textarea name="message" placeholder="यहाँ मैसेज टाइप करें"></textarea>
        </td>

        <td style="padding:8px;text-align:center;vertical-align:middle;">
            <button type="submit">भेजें</button>
        </td>
    </tr>
</table>

</form>

</body>
</html>
